<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1150" viewBox="0 0 2200 1150">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#111827"/>
    </marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#111827}
      .stage{font-family:Georgia,serif;font-size:28px;font-weight:700;fill:white;text-anchor:middle}
      .title{font-size:22px;font-weight:700;text-anchor:middle}
      .body{font-size:16px;text-anchor:middle}
      .small{font-size:14px;text-anchor:middle;fill:#334155}
      .note{font-size:18px;font-weight:700;fill:#64748b}
      .arrow{stroke:#111827;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .dash{stroke-dasharray:8 7}
    </style>
  </defs>

  <rect x="2" y="2" width="2196" height="1146" fill="#ffffff" stroke="#111827" stroke-width="3"/>
  <text x="40" y="45" class="note">E-D3DGS project pipeline: monocular video → COLMAP/SfM scene → per-Gaussian embedded deformation → monocular + synthetic stereo rendering</text>
  <text x="40" y="75" class="note">Dynamic-mask branches are intentionally omitted. Motion priors and stereo consistency are included.</text>

  <!-- stage bands -->
  <rect x="0" y="1088" width="260" height="58" fill="#355f22"/><text x="130" y="1126" class="stage">Input</text>
  <rect x="260" y="1088" width="430" height="58" fill="#8b0000"/><text x="475" y="1126" class="stage">Monocular Preprocess</text>
  <rect x="690" y="1088" width="360" height="58" fill="#334155"/><text x="870" y="1126" class="stage">Camera Timeline Loading</text>
  <rect x="1050" y="1088" width="500" height="58" fill="#183f5f"/><text x="1300" y="1126" class="stage">Per-Gaussian E-D3DGS Training</text>
  <rect x="1550" y="1088" width="360" height="58" fill="#355f22"/><text x="1730" y="1126" class="stage">Rendering Output</text>
  <rect x="1910" y="1088" width="290" height="58" fill="#4b176f"/><text x="2055" y="1126" class="stage">Evaluation</text>

  <!-- input -->
  <g id="input">
    <polygon points="55,160 165,120 165,250 55,290" fill="#e5e7eb" stroke="#1d4e89" stroke-width="5"/>
    <line x1="75" y1="190" x2="145" y2="160" stroke="#94a3b8" stroke-width="4"/>
    <circle cx="112" cy="210" r="18" fill="#64748b" opacity=".75"/>
    <rect x="78" y="238" width="70" height="25" fill="#94a3b8" opacity=".75"/>
    <text x="110" y="325" font-size="28" font-weight="700" text-anchor="middle">I<tspan baseline-shift="super" font-size="16">t−1</tspan></text>

    <polygon points="82,380 192,340 192,470 82,510" fill="#e5e7eb" stroke="#1d4e89" stroke-width="5"/>
    <line x1="102" y1="410" x2="172" y2="380" stroke="#94a3b8" stroke-width="4"/>
    <circle cx="139" cy="430" r="18" fill="#64748b" opacity=".75"/>
    <rect x="105" y="458" width="70" height="25" fill="#94a3b8" opacity=".75"/>
    <text x="137" y="545" font-size="28" font-weight="700" text-anchor="middle">I<tspan baseline-shift="super" font-size="16">t</tspan></text>

    <polygon points="55,600 165,560 165,690 55,730" fill="#e5e7eb" stroke="#1d4e89" stroke-width="5"/>
    <line x1="75" y1="630" x2="145" y2="600" stroke="#94a3b8" stroke-width="4"/>
    <circle cx="112" cy="650" r="18" fill="#64748b" opacity=".75"/>
    <rect x="78" y="678" width="70" height="25" fill="#94a3b8" opacity=".75"/>
    <text x="110" y="765" font-size="28" font-weight="700" text-anchor="middle">I<tspan baseline-shift="super" font-size="16">t+1</tspan></text>

    <text x="125" y="850" font-size="27" font-weight="700" text-anchor="middle">Monocular video</text>
    <text x="125" y="882" font-size="22" text-anchor="middle">single captured stream</text>
  </g>

  <!-- preprocessing column -->
  <rect x="305" y="145" width="310" height="120" rx="16" fill="#fff7ed" stroke="#9a3412" stroke-width="4"/>
  <text x="460" y="183" class="title">Monocular SfM</text>
  <text x="460" y="214" class="body">from monocular frames</text>
  <text x="460" y="242" class="small">camera poses + sparse points</text>

  <rect x="305" y="330" width="310" height="125" rx="16" fill="#eff6ff" stroke="#1d4ed8" stroke-width="4"/>
  <text x="460" y="368" class="title">Motion Prior Estimation</text>
  <text x="460" y="399" class="body">Residual flow prior</text>
  <text x="460" y="427" class="small">optical flow − camera/parallax flow</text>

  <rect x="305" y="520" width="310" height="125" rx="16" fill="#fefce8" stroke="#a16207" stroke-width="4"/>
  <text x="460" y="558" class="title">Optional Depth Prior</text>
  <text x="460" y="589" class="body">Monocular depth estimate</text>
  <text x="460" y="617" class="small">relative monocular depth</text>

  <rect x="305" y="710" width="310" height="125" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="4"/>
  <text x="460" y="748" class="title">Prepared Scene Inputs</text>
  <text x="460" y="779" class="body">images/ + ns_output/colmap/</text>
  <text x="460" y="807" class="small">points3D_downsample.ply + sidecars</text>

  <!-- scene column -->
  <rect x="730" y="220" width="280" height="140" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="4"/>
  <text x="870" y="258" class="title">Camera Timeline Assembly</text>
  <text x="870" y="289" class="body">COLMAP + sidecar resolver</text>
  <text x="870" y="317" class="small">poses, images, point cloud</text>
  <text x="870" y="340" class="small">attach priors/depth to frames</text>

  <rect x="730" y="440" width="280" height="130" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="4"/>
  <text x="870" y="478" class="title">Camera Timeline</text>
  <text x="870" y="509" class="body">train/test/video split</text>
  <text x="870" y="537" class="small">ordered viewpoint sequence</text>

  <rect x="730" y="650" width="280" height="150" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="4"/>
  <text x="870" y="688" class="title">Viewpoint State</text>
  <text x="870" y="719" class="body">per-frame camera state</text>
  <text x="870" y="747" class="small">R,T,FoV,time, image</text>
  <text x="870" y="770" class="small">world-view + projection matrix</text>

  <!-- central model/training container -->
  <rect x="1060" y="120" width="465" height="865" rx="24" fill="#f8fafc" stroke="#1e3a8a" stroke-width="4" stroke-dasharray="10 8"/>
  <rect x="1130" y="106" width="325" height="48" fill="#ffffff"/>
  <text x="1292" y="138" font-family="Georgia,serif" font-size="26" font-weight="700" text-anchor="middle">Per-Gaussian Embedded 3DGS</text>

  <rect x="1095" y="185" width="395" height="125" rx="16" fill="#ffffff" stroke="#0f172a" stroke-width="4"/>
  <text x="1292" y="223" class="title">3D Gaussian State 🔥</text>
  <text x="1292" y="254" class="body">xyz, scale, rotation, opacity, SH</text>
  <text x="1292" y="282" font-size="16" font-weight="700" text-anchor="middle">+ learned per-Gaussian embedding eᵢ</text>

  <rect x="1095" y="365" width="395" height="145" rx="16" fill="#ffffff" stroke="#0f172a" stroke-width="4"/>
  <text x="1292" y="403" class="title">Embedded Deformation Field 🔥</text>
  <text x="1292" y="434" class="body">temporal embedding τ(t) + eᵢ</text>
  <text x="1292" y="462" class="small">coarse + fine MLP stages</text>
  <text x="1292" y="486" class="small">predict Δxyz, Δscale, Δrot, Δopacity, ΔSH</text>

  <rect x="1095" y="565" width="395" height="130" rx="16" fill="#eef2ff" stroke="#1d4ed8" stroke-width="4"/>
  <text x="1292" y="603" class="title">Render Input View</text>
  <text x="1292" y="634" class="body">splat deformed Gaussians</text>
  <text x="1292" y="662" class="small">differentiable CUDA Gaussian rasterizer</text>

  <rect x="1095" y="750" width="395" height="125" rx="16" fill="#fee2e2" stroke="#b91c1c" stroke-width="4"/>
  <text x="1292" y="788" class="title">Synthetic Right View</text>
  <text x="1292" y="819" class="body">baseline-shifted camera</text>
  <text x="1292" y="847" class="small">camera-local +x baseline shift</text>

  <rect x="1095" y="910" width="395" height="55" rx="14" fill="#e2e8f0" stroke="#334155" stroke-width="3"/>
  <text x="1292" y="946" font-size="19" font-weight="700" text-anchor="middle">backprop + densify/prune + checkpoint</text>

  <!-- loss boxes beside central container -->
  <rect x="1565" y="195" width="285" height="105" rx="14" fill="#ffffff" stroke="#475569" stroke-width="3"/>
  <text x="1707" y="232" class="title">Photo + SSIM</text>
  <text x="1707" y="263" class="body">input render vs monocular GT</text>

  <rect x="1565" y="365" width="285" height="130" rx="14" fill="#ffffff" stroke="#475569" stroke-width="3"/>
  <text x="1707" y="402" class="title">Stereo Consistency</text>
  <text x="1707" y="433" class="body">forward-warp left depth/RGB</text>
  <text x="1707" y="461" class="small">compare against synthetic right render</text>

  <rect x="1565" y="560" width="285" height="120" rx="14" fill="#ffffff" stroke="#475569" stroke-width="3"/>
  <text x="1707" y="597" class="title">Motion Prior Loss</text>
  <text x="1707" y="628" class="body">residual-motion weighted error</text>
  <text x="1707" y="655" class="small">also oversampling/densification cue</text>

  <rect x="1565" y="745" width="285" height="115" rx="14" fill="#ffffff" stroke="#475569" stroke-width="3"/>
  <text x="1707" y="782" class="title">Regularizers</text>
  <text x="1707" y="813" class="body">embedding smoothness</text>
  <text x="1707" y="840" class="small">temporal TV, opacity, optional depth</text>

  <!-- output/eval column -->
  <rect x="1585" y="910" width="280" height="70" rx="14" fill="#ecfdf5" stroke="#166534" stroke-width="4"/>
  <text x="1725" y="938" class="title">Checkpoints</text>
  <text x="1725" y="964" class="small">trained Gaussians + deformation field</text>

  <rect x="1930" y="185" width="210" height="110" rx="14" fill="#ecfdf5" stroke="#166534" stroke-width="4"/>
  <text x="2035" y="223" class="title">Monocular Output</text>
  <text x="2035" y="254" class="body">monocular renders</text>
  <text x="2035" y="279" class="small">train/test/video</text>

  <rect x="1930" y="365" width="210" height="130" rx="14" fill="#fdf2f8" stroke="#9d174d" stroke-width="4"/>
  <text x="2035" y="403" class="title">Stereo Output</text>
  <text x="2035" y="434" class="body">left=input render</text>
  <text x="2035" y="462" class="body">right=synthetic IPD</text>

  <rect x="1930" y="560" width="210" height="120" rx="14" fill="#f3e8ff" stroke="#6b21a8" stroke-width="4"/>
  <text x="2035" y="598" class="title">Quality Metrics</text>
  <text x="2035" y="629" class="body">PSNR / SSIM / LPIPS</text>
  <text x="2035" y="656" class="small">TF / EPE / D1 proxy</text>

  <rect x="1930" y="745" width="210" height="105" rx="14" fill="#f3e8ff" stroke="#6b21a8" stroke-width="4"/>
  <text x="2035" y="785" class="title">JSON outputs</text>
  <text x="2035" y="816" class="body">results.json</text>
  <text x="2035" y="842" class="body">per_view.json</text>

  <!-- arrows: input to preprocess -->
  <path class="arrow" d="M200 445 C245 445 260 205 305 205"/>
  <path class="arrow" d="M200 445 C245 445 260 392 305 392"/>
  <path class="arrow" d="M200 445 C245 445 260 582 305 582"/>
  <path class="arrow" d="M200 445 C245 445 260 772 305 772"/>

  <!-- preprocess to scene -->
  <path class="arrow" d="M615 205 C665 205 680 290 730 290"/>
  <path class="arrow dash" d="M615 392 C670 392 675 308 730 308"/>
  <path class="arrow dash" d="M615 582 C670 582 675 326 730 326"/>
  <path class="arrow" d="M615 772 C675 772 675 725 730 725"/>
  <path class="arrow" d="M870 360 L870 440"/>
  <path class="arrow" d="M870 570 L870 650"/>

  <!-- scene to model/training -->
  <path class="arrow" d="M1010 725 C1045 725 1055 248 1095 248"/>
  <path class="arrow" d="M1010 725 C1045 725 1055 630 1095 630"/>

  <!-- model internal arrows -->
  <path class="arrow" d="M1292 310 L1292 365"/>
  <path class="arrow" d="M1292 510 L1292 565"/>
  <path class="arrow" d="M1292 695 L1292 750"/>
  <path class="arrow" d="M1292 875 L1292 910"/>
  <path class="arrow dash" d="M1095 938 C1015 930 1015 225 1095 225"/>

  <!-- training to losses -->
  <path class="arrow" d="M1490 630 C1525 630 1525 248 1565 248"/>
  <path class="arrow" d="M1490 812 C1530 812 1525 430 1565 430"/>
  <path class="arrow dash" d="M615 392 C1000 392 1190 620 1565 620"/>
  <path class="arrow" d="M1490 938 C1528 938 1525 802 1565 802"/>
  <path class="arrow" d="M1707 300 C1707 330 1515 915 1490 938"/>
  <path class="arrow" d="M1707 495 C1707 535 1515 915 1490 938"/>
  <path class="arrow" d="M1707 680 C1707 710 1515 915 1490 938"/>
  <path class="arrow" d="M1707 860 C1707 890 1535 930 1490 938"/>

  <!-- output/eval arrows -->
  <path class="arrow" d="M1490 938 L1585 945"/>
  <path class="arrow" d="M1865 945 C1905 945 1900 240 1930 240"/>
  <path class="arrow" d="M1865 945 C1905 945 1900 430 1930 430"/>
  <path class="arrow" d="M2035 295 L2035 365"/>
  <path class="arrow" d="M2035 495 L2035 560"/>
  <path class="arrow" d="M2035 680 L2035 745"/>


  <!-- explicit feature payloads, concat and OR nodes -->
  <g id="feature_payload_annotations">
    <!-- OR choices in preprocessing/data resolution -->
    <polygon points="660,178 700,218 660,258 620,218" fill="#fff" stroke="#111827" stroke-width="3"/>
    <text x="660" y="224" font-size="18" font-weight="700" text-anchor="middle">OR</text>
    <text x="660" y="276" class="small">COLMAP source</text>
    <text x="660" y="296" class="small">ns_output/colmap OR colmap/dense</text>

    <polygon points="660,372 700,412 660,452 620,412" fill="#fff" stroke="#1d4ed8" stroke-width="3"/>
    <text x="660" y="418" font-size="18" font-weight="700" text-anchor="middle">OR</text>
    <text x="660" y="470" class="small">flow method</text>
    <text x="660" y="490" class="small">Farneback OR RAFT OR FFT fallback</text>

    <polygon points="660,560 700,600 660,640 620,600" fill="#fff" stroke="#a16207" stroke-width="3"/>
    <text x="660" y="606" font-size="18" font-weight="700" text-anchor="middle">OR</text>
    <text x="660" y="658" class="small">depth sidecar</text>
    <text x="660" y="678" class="small">DA3 .npy OR image depth OR none</text>

    <!-- Feature labels on main data arrows -->
    <rect x="214" y="185" width="82" height="26" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="255" y="204" font-size="14" font-weight="700" text-anchor="middle">RGB frames</text>
    <rect x="214" y="382" width="82" height="26" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="255" y="401" font-size="14" font-weight="700" text-anchor="middle">I_t,I_{t+1}</text>
    <rect x="214" y="575" width="82" height="26" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="255" y="594" font-size="14" font-weight="700" text-anchor="middle">RGB frames</text>

    <rect x="635" y="127" width="150" height="30" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="710" y="148" font-size="14" font-weight="700" text-anchor="middle">K, R, T, FoV, t</text>
    <rect x="635" y="318" width="150" height="30" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="710" y="339" font-size="14" font-weight="700" text-anchor="middle">M_t motion confidence</text>
    <rect x="635" y="704" width="150" height="30" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="710" y="725" font-size="14" font-weight="700" text-anchor="middle">X₀, RGB point cloud</text>

    <rect x="1015" y="675" width="92" height="30" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="1061" y="696" font-size="14" font-weight="700" text-anchor="middle">Camera C_t</text>
    <rect x="1018" y="223" width="82" height="30" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="1059" y="244" font-size="14" font-weight="700" text-anchor="middle">X₀,c₀</text>

    <!-- Explicit concatenation inside E-D3DGS -->
    <rect x="1115" y="325" width="128" height="34" rx="7" fill="#eef2ff" stroke="#1d4ed8"/>
    <text x="1179" y="348" font-size="15" font-weight="700" text-anchor="middle">τ(t) temporal</text>
    <rect x="1342" y="325" width="128" height="34" rx="7" fill="#eef2ff" stroke="#1d4ed8"/>
    <text x="1406" y="348" font-size="15" font-weight="700" text-anchor="middle">eᵢ Gaussian</text>
    <circle cx="1292" cy="342" r="23" fill="#fff" stroke="#111827" stroke-width="3"/>
    <text x="1292" y="349" font-size="18" font-weight="700" text-anchor="middle">C</text>
    <path class="arrow" d="M1243 342 L1269 342"/>
    <path class="arrow" d="M1342 342 L1315 342"/>
    <path class="arrow" d="M1292 365 L1292 388"/>
    <text x="1292" y="310" class="small">concatenate: hᵢ(t) = [τ(t), eᵢ]</text>

    <!-- Rendered feature payloads and losses -->
    <rect x="1320" y="704" width="138" height="30" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="1389" y="725" font-size="14" font-weight="700" text-anchor="middle">Î_L, D_L, radii</text>
    <rect x="1320" y="883" width="138" height="30" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="1389" y="904" font-size="14" font-weight="700" text-anchor="middle">Î_R synthetic</text>

    <rect x="1518" y="214" width="44" height="26" rx="5" fill="#fff" stroke="#cbd5e1"/>
    <text x="1540" y="233" font-size="13" font-weight="700" text-anchor="middle">Î_L,I</text>
    <rect x="1518" y="402" width="44" height="26" rx="5" fill="#fff" stroke="#cbd5e1"/>
    <text x="1540" y="421" font-size="13" font-weight="700" text-anchor="middle">Î_L,D,Î_R</text>
    <rect x="1518" y="596" width="44" height="26" rx="5" fill="#fff" stroke="#cbd5e1"/>
    <text x="1540" y="615" font-size="13" font-weight="700" text-anchor="middle">M_t</text>

    <rect x="1518" y="927" width="64" height="30" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="1550" y="948" font-size="14" font-weight="700" text-anchor="middle">∇θ,∇eᵢ</text>

    <!-- Rendering output payloads -->
    <rect x="1870" y="920" width="58" height="30" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="1899" y="941" font-size="14" font-weight="700" text-anchor="middle">θ_N</text>
    <rect x="1888" y="404" width="44" height="26" rx="5" fill="#fff" stroke="#cbd5e1"/>
    <text x="1910" y="423" font-size="13" font-weight="700" text-anchor="middle">L/R</text>
  </g>

  <!-- legend -->
  <rect x="70" y="940" width="480" height="105" fill="#ffffff" stroke="#111827" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="95" y="975" font-size="18" font-weight="700">Legend</text>
  <text x="95" y="1005" font-size="17">🔥 trainable modules/parameters</text>
  <text x="95" y="1032" font-size="17">Dashed arrows: sidecar or feedback paths</text>
</svg>
